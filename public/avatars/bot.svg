<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#botGradient)"/>
  <!-- Head -->
  <rect x="30" y="25" width="40" height="35" rx="5" fill="white"/>
  <!-- Eyes -->
  <circle cx="40" cy="38" r="3" fill="#667eea"/>
  <circle cx="60" cy="38" r="3" fill="#667eea"/>
  <!-- Mouth -->
  <path d="M 40 48 Q 50 52 60 48" stroke="#667eea" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="35" y="62" width="30" height="25" rx="3" fill="white"/>
  <!-- Antenna left -->
  <line x1="38" y1="25" x2="35" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="35" cy="15" r="2" fill="white"/>
  <!-- Antenna right -->
  <line x1="62" y1="25" x2="65" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="65" cy="15" r="2" fill="white"/>
</svg>